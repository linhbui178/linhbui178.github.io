<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Friends Viewer</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <meta name="theme-color" content="#712cf9">
  <link href="https://getbootstrap.com/docs/5.3/examples/modals/modals.css" rel="stylesheet">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 2rem;
    }

    h1 {
      margin-bottom: 1rem;
    }

    .controls {
      display: flex;
      gap: 1rem;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }

    input[type="number"] {
      padding: 0.5rem;
      width: 120px;
    }

    button {
      padding: 0.5rem 1rem;
      cursor: pointer;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 1rem;
    }

    th,
    td {
      border: 1px solid #ccc;
      padding: 0.6rem;
      text-align: left;
    }

    th {
      background-color: #f4f4f4;
    }

    .message {
      margin-top: 1rem;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <h1>Friends</h1>

  <div class="controls">
    <!-- Add Buttons and Text Input here-->
    <button id="loadAllBtn">Load All Friends</button>
  </div>

  <div id="message" class="message"></div>

  <table id="friendsTable">
    <thead>
      <tr>
        <th>Name</th>
      </tr>
    </thead>
    <tbody>
    </tbody>
  </table>
  <div class="modal modal-sheet fade" id="friendModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content rounded-4 shadow">
        <div class="modal-header border-bottom-0">
          <h1 class="modal-title fs-5" id="modalTitle">Modal title</h1>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body py-0" id="modalBody">
          Friend details will be shown here
        </div>
        <div class="modal-footer flex-column align-items-stretch w-100 gap-2 pb-3 border-top-0">
          <button type="button" class="btn btn-lg btn-secondary" data-bs-dismiss="modal">
            Close
          </button>
        </div>
      </div>
    </div>
  </div>
  <script>
    const API_URL = "https://friends-node-01-47e26a48b0b0.herokuapp.com/friends";
    const loadAllBtn = document.getElementById("loadAllBtn");
    const tableBody = document.querySelector("#friendsTable tbody");
    const messageDiv = document.getElementById("message");

    function clearTable() {
      tableBody.innerHTML = "";
    }

    function showMessage(message) {
      messageDiv.textContent = message;
    }

    async function ShowFriend(id) {
      try {
        const response = await fetch(`${API_URL}/${id}`);
        if (!response.ok) {
          throw new Error("Failed to load friend");
        }

        const friend = await response.json();
        document.getElementById("modalTitle").textContent =
          `${friend.firstName} ${friend.lastName}`;

        document.getElementById("modalBody").innerHTML = `
      <p><strong>ID:</strong> ${friend.id}</p>
      <p><strong>First Name:</strong> ${friend.firstName}</p>
      <p><strong>Last Name:</strong> ${friend.lastName}</p>
      <p><strong>Phone:</strong> ${friend.phone}</p>
    `;

        // Show modal
        const modal = new bootstrap.Modal(document.getElementById("friendModal"));
        modal.show();

      } catch (error) {
        showMessage("Error loading friend details.");
      }
    }

    function addFriendRow(friend) {
      const row = document.createElement("tr");

      row.innerHTML = `
        <td><a href="#" onclick="ShowFriend(${friend.id}); return false;">${friend.firstName} ${friend.lastName}</a></td>
      `;

      tableBody.appendChild(row);
    }

    async function loadAllFriends() {
      clearTable();
      showMessage("Loading all friends...");

      try {
        const response = await fetch(API_URL);
        if (!response.ok) {
          throw new Error(`HTTP error ${response.status}`);
        }

        const friends = await response.json();

        if (!Array.isArray(friends) || friends.length === 0) {
          showMessage("No friends found.");
          return;
        }

        friends.forEach(addFriendRow);
        showMessage(`Loaded ${friends.length} friends.`);
      } catch (error) {
        showMessage(`Error loading friends: ${error.message}`);
      }
    }

    loadAllBtn.addEventListener("click", loadAllFriends);
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
