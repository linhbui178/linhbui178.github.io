<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hangman Game</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container text-center mt-5">
  <h1 class="mb-4">Hangman Game</h1>

  <h3 id="wordDisplay">_ _ _ _</h3>
  <p class="mt-3">Guesses left: <span id="guessesLeft">7</span></p>
  <p>Wrong letters: <span id="wrongLetters"></span></p>

  <!-- Letter Guess -->
  <div class="w-25 mx-auto mt-3">
    <div class="d-flex align-items-center gap-2">
      <input type="text" id="letterInput" maxlength="1" class="form-control flex-grow-1" placeholder="Guess a letter">
      <button class="btn btn-primary btn-sm px-2" onclick="makeGuess()">Enter</button>
    </div>
  </div>

  <!-- Word Guess -->
  <div class="w-25 mx-auto mt-4">
    <div class="d-flex align-items-center gap-2">
      <input type="text" id="wordInput" class="form-control flex-grow-1" placeholder="Guess the word">
      <button class="btn btn-warning btn-sm px-2" onclick="guessWord()">Enter</button>
    </div>
  </div>

  <p id="message" class="mt-3 fw-bold"></p>
  <button class="btn btn-danger mt-3 w-25 mx-auto" onclick="startGame()">Restart</button>
</div>

<script>
// JSON word list
const data = `{"words": [
  "planet",
  "guitar",
  "window",
  "mountain",
  "pencil",
  "airplane",
  "library",
  "shadow",
  "ocean",
  "rocket",
  "flower",
  "bridge",
  "castle",
  "forest",
  "diamond",
  "thunder",
  "river",
  "cloud",
  "mirror",
  "island",
  "robot",
  "school",
  "basket",
  "circle",
  "orange",
  "banana",
  "computer",
  "keyboard",
  "notebook",
  "pyramid",
  "volcano",
  "galaxy",
  "universe",
  "satellite",
  "engine",
  "puzzle",
  "ticket",
  "adventure",
  "journey",
  "language"
]}`;
const wordList = JSON.parse(data).words;

let selectedWord = "";
let guessedLetters = [];
let wrongLetters = [];
let guessesLeft = 7;

function startGame() {
  selectedWord = wordList[Math.floor(Math.random() * wordList.length)];
  guessedLetters = [];
  wrongLetters = [];
  guessesLeft = 7;

  document.getElementById("message").textContent = "";
  document.getElementById("letterInput").disabled = false;
  document.getElementById("wordInput").disabled = false;

  document.getElementById("letterInput").value = "";
  document.getElementById("wordInput").value = "";

  updateDisplay();
}

function updateDisplay() {
  const display = selectedWord
    .split("")
    .map(letter => guessedLetters.includes(letter) ? letter : "_")
    .join(" ");

  document.getElementById("wordDisplay").textContent = display;
  document.getElementById("guessesLeft").textContent = guessesLeft;
  document.getElementById("wrongLetters").textContent = wrongLetters.join(", ");

  checkGameStatus();
}

function makeGuess() {
  const input = document.getElementById("letterInput");
  const letter = input.value.toLowerCase();
  input.value = "";

  if (!letter.match(/[a-z]/) || letter.length !== 1) return;

  if (guessedLetters.includes(letter) || wrongLetters.includes(letter)) return;

  if (selectedWord.includes(letter)) {
    guessedLetters.push(letter);
  } else {
    wrongLetters.push(letter);
    guessesLeft--;
  }

  updateDisplay();
}

function guessWord() {
  const input = document.getElementById("wordInput");
  const guess = input.value.toLowerCase();
  input.value = "";

  if (!guess) return;

  if (guess === selectedWord) {
    guessedLetters = selectedWord.split("");
    updateDisplay();
    document.getElementById("message").textContent = "Correct! You guessed the word!";
    disableInput();
  } else {
    guessesLeft--;
    document.getElementById("message").textContent = "Wrong word guess!";
    updateDisplay();
  }
}

function checkGameStatus() {
  const wordComplete = selectedWord
    .split("")
    .every(letter => guessedLetters.includes(letter));

  if (wordComplete) {
    document.getElementById("message").textContent = "You Win!";
    disableInput();
  }

  if (guessesLeft === 0) {
    document.getElementById("message").textContent = "You Lose! Word was: " + selectedWord;
    disableInput();
  }
}

function disableInput() {
  document.getElementById("letterInput").disabled = true;
  document.getElementById("wordInput").disabled = true;
}

// Enter key support
document.getElementById("letterInput").addEventListener("keypress", function(e) {
  if (e.key === "Enter") makeGuess();
});

document.getElementById("wordInput").addEventListener("keypress", function(e) {
  if (e.key === "Enter") guessWord();
});

startGame();
</script>

</body>
</html>
